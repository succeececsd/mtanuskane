<!DOCTYPE html>
<html>
<head>
  <style>
    /* Full-page loading overlay */
    #loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(255, 255, 255, 0.7); /* white with transparency */
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    /* Spinner style */
    .spinner {
      width: 50px;
      height: 50px;
      border: 6px solid #f3f3f3;
      border-top: 6px solid #009e58; /* your green color */
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Blur the content (form) while loading overlay is shown */
    body.loading .content__container {
      filter: blur(4px);
      pointer-events: none; /* disable clicks while loading */
    }
  </style>
</head>
<body class="loading">

  <!-- Loading overlay -->
  <div id="loading-overlay">
    <div class="spinner"></div>
  </div>

  <!-- Your form page content -->
  <form method="post" data-action="/api/registration" data-bind data-stable-name="EstablishIdentityForm" data-role="extendedvalidator" novalidate>
    <div class="hide sf-hidden"></div>
    <div class="content__container">
      <div class="col5">
        <div data-viewmodel="configurablefields/viewmodels/fieldgroups" data-field-id="IdentityEstablishmentFields" data-default-field-group data-stable-name="SelectableGroupFields">
          <div class="form-control-container">
            <span class="toggle__switch"></span>
          </div>
        </div>

        <div data-field-group="IndividualAccount" data-bind="visible:isIndividualAccountGroupVisible">
          <div class="form-control-container"></div>
          <div class="form-control-container" data-bind>
            <label>
              <span class="k-invalid-msg" data-for="MemberAccountNumber" data-stable-name="ErrorText" aria-hidden="true" style="display:none"></span>
            </label>
          </div>
          <div class="form-control-container"></div>
        </div>
      </div>

      <div data-bind data-role="notifier" style="display:none"></div>
    </div>
  </form>

  <script>
    // Simulate loading or wait for some event, then remove overlay
    window.addEventListener('load', () => {
      // emulate delay (like waiting for an API or render)
      setTimeout(() => {
        document.body.classList.remove('loading');
        const overlay = document.getElementById('loading-overlay');
        overlay.parentNode.removeChild(overlay);
      }, 2000000); // 2 second delay before removing the overlay
    });
  </script>
</body>
